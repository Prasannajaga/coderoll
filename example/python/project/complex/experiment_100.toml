id = "python_complex_project_mode_100"
mode = "project"
language = "python"


[project]
path = "generated_project_v2"


[setup]
commands = []

[[eval.commands]]
name = "tests"
command = "python -m pytest -q tests/test_math_ops.py --junitxml=.coderoll-results.xml"
result_format = "junit"

[output]
path = "runs/python_complex_project_mode_100_results.jsonl"

[runner]
workers = 1

[sandbox]
image = "coderoll-python:3.11"
timeout = 20
memory = "512m"
cpus = "1"
pids_limit = 128
network = false

[viewer]
enabled = true
out = "runs/python_complex_project_mode_100.viewer.html"
open = false

id: javascript_nested_project_mode_100
mode: project
language: javascript

project:
  path: generated_project_v2

setup:
  commands: []

eval:
  commands:
    - name: tests
      command: node --test --test-reporter=tap packages/calculator/tests/add.test.js
      result_format: tap

output:
  path: runs/javascript_nested_project_mode_100_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-node:20
  timeout: 20
  memory: 512m
  cpus: "1"
  pids_limit: 128
  network: false

viewer:
  enabled: true
  out: runs/javascript_nested_project_mode_100.viewer.html
  open: false

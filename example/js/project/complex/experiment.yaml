id: js_project_complex
mode: project
language: javascript

project:
  path: generated_project

setup:
  commands: []

eval:
  commands:
    - name: tests
      command: node --test --test-reporter=tap
      result_format: tap

output:
  path: runs/js_project_complex_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-node:20
  timeout: 15
  memory: 254m
  cpus: "1"
  pids_limit: 128
  network: false

viewer:
  enabled: true
  out: runs/js_project_complex.viewer.html
  open: false

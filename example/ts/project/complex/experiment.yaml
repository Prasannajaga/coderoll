id: ts_project_complex
mode: project
language: typescript

project:
  path: generated_project

setup:
  commands: []

eval:
  commands:
    - name: typecheck
      command: tsc --noEmit
      result_format: exit_code
    - name: build
      command: tsc --outDir dist
      result_format: exit_code
    - name: tests
      command: node --test --test-reporter=tap dist/tests/math_ops.test.js
      result_format: tap

output:
  path: runs/ts_project_complex_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-node-ts:20
  timeout: 20
  memory: 512m
  cpus: "1"
  pids_limit: 128
  network: false

viewer:
  enabled: true
  out: runs/ts_project_complex.viewer.html
  open: false

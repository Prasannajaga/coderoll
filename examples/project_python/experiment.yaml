id: project_python_eval

workspace:
  mode: project
  path: project

candidates:
  type: jsonl
  path: candidates.jsonl
  mode: files

setup:
  commands:
    - python -m pip install -r requirements.txt
  allow_candidate_dependencies: false

eval:
  commands:
    - name: tests
      command: python -m pytest -q --junitxml=.coderoll-results.xml
      result_format: junit
  result_format: junit
  stop_on_first_failure: false
  score_strategy: weighted

output:
  path: ../../runs/project_python_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-python:3.11
  timeout: 20
  memory: 512m
  cpus: "1"
  pids_limit: 256
  network: false

viewer:
  enabled: true
  out: ../../runs/project_python.viewer.html
  open: false

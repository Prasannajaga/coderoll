id: json_array_eval

workspace:
  mode: project
  path: project

candidates:
  type: json
  path: candidates.json
  mode: file
  entry_file: solution.py

setup:
  commands:
    - python -m pip install -r requirements.txt
  allow_candidate_dependencies: false

eval:
  commands:
    - name: tests
      command: python -m pytest -q --junitxml=.coderoll-results.xml
      result_format: junit
  result_format: junit

output:
  path: ../../runs/json_array_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-python:3.11
  timeout: 20
  memory: 512m
  cpus: "1"
  pids_limit: 256
  network: false

viewer:
  enabled: true
  out: ../../runs/json_array.viewer.html
  open: false

id: complex_project_mode_eval
mode: project
language: python

project:
  path: generated_project

setup:
  commands:
    - python -m pip install -r requirements.txt

eval:
  commands:
    - name: tests
      command: python -m pytest -q --junitxml=.coderoll-results.xml
      result_format: junit

output:
  path: ../../runs/complex_project_mode_results.jsonl

runner:
  workers: 1

sandbox:
  image: coderoll-python:3.11
  timeout: 25
  memory: 512m
  cpus: "1"
  pids_limit: 256
  network: false

viewer:
  enabled: true
  out: ../../runs/complex_project_mode.viewer.html
  open: false
